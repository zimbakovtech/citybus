services:
  db:
    image: postgis/postgis:16-3.5
    container_name: citybus-db
    environment:
      POSTGRES_DB: citybus
      POSTGRES_USER: citybus
      POSTGRES_PASSWORD: citybus
    ports:
      - "5432:5432"
    volumes:
      - citybus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citybus -d citybus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  citybus_pgdata:
