name: citybus
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.9
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.3
  go_router: ^17.3.0
  intl: ^0.20.3
  json_annotation: ^4.12.0
  latlong2: ^0.10.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/branding/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-400.ttf
          weight: 400
        - asset: assets/fonts/Outfit-500.ttf
          weight: 500
        - asset: assets/fonts/Outfit-600.ttf
          weight: 600
        - asset: assets/fonts/Outfit-700.ttf
          weight: 700
        - asset: assets/fonts/Outfit-800.ttf
          weight: 800
