name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_DB: citybus
          POSTGRES_USER: citybus
          POSTGRES_PASSWORD: citybus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U citybus -d citybus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://citybus:citybus@localhost:5432/citybus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check app scripts alembic
          black --check app scripts alembic

      - name: Migrate schema
        run: alembic upgrade head

      - name: Import seed GTFS feed
        run: python scripts/import_gtfs.py

      - name: Run tests
        run: pytest

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
